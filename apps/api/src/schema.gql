# CoreAsset ITAM — GraphQL Schema (schema-first)

# ============================================
# Types
# ============================================

type HardwareAsset {
  id: String!
  serialNumber: String!
  name: String!
  type: String!
  brand: String!
  model: String!
  lifecycleState: String!
  purchaseDate: String
  warrantyEndDate: String
  discoveryMetadata: String
  createdAt: String!
  updatedAt: String!
  # Relations (match Prisma field names)
  workplaces: [Workplace!]!
  installations: [SoftwareInstallation!]!
  faultIncidents: [FaultHistoryIncident!]!
}

type User {
  id: String!
  employeeId: String!
  fullName: String!
  email: String!
  department: String
  position: String
  createdAt: String!
  updatedAt: String!
  # Relations
  workplaces: [Workplace!]!
}

type Workplace {
  id: String!
  name: String!
  location: String
  userId: String!
  hardwareId: String!
  createdAt: String!
  updatedAt: String!
  # Relations
  user: User!
  hardware: HardwareAsset!
}

type SoftwareCatalog {
  id: String!
  softwareName: String!
  version: String!
  publisher: String
  category: String
  createdAt: String!
  updatedAt: String!
  # Relations
  licenses: [License!]!
}

type License {
  id: String!
  licenseKey: String
  concurrencyLimit: Int!
  purchaseDate: String
  expiryDate: String
  price: Float
  softwareId: String!
  createdAt: String!
  updatedAt: String!
  # Relations
  software: SoftwareCatalog!
  installations: [SoftwareInstallation!]!
  # Computed fields
  usedCount: Int!
  availableCount: Int!
  isOverLimit: Boolean!
}

type SoftwareInstallation {
  id: String!
  hardwareId: String!
  licenseId: String!
  installedAt: String!
  status: String!
  createdAt: String!
  updatedAt: String!
  # Relations
  hardware: HardwareAsset!
  license: License!
}

type FaultHistoryIncident {
  id: String!
  hardwareId: String!
  incidentDescription: String!
  severity: String!
  status: String!
  reportedAt: String!
  resolvedAt: String
  createdAt: String!
  updatedAt: String!
  # Relations
  hardware: HardwareAsset!
}

# ============================================
# Paginated Wrapper Types
# ============================================

type HardwareAssetPaginated {
  items: [HardwareAsset!]!
  total: Int!
}

type UserPaginated {
  items: [User!]!
  total: Int!
}

type WorkplacePaginated {
  items: [Workplace!]!
  total: Int!
}

type SoftwareCatalogPaginated {
  items: [SoftwareCatalog!]!
  total: Int!
}

type LicensePaginated {
  items: [License!]!
  total: Int!
}

type FaultHistoryIncidentPaginated {
  items: [FaultHistoryIncident!]!
  total: Int!
}

# ============================================
# Dashboard Nested Types
# ============================================

type HardwareStats {
  total: Int!
  byState: [StateCount!]!
  byType: [TypeCount!]!
}

type StateCount {
  state: String!
  count: Int!
}

type TypeCount {
  type: String!
  count: Int!
}

type UserStats {
  total: Int!
}

type WorkplaceStats {
  total: Int!
}

type SoftwareStats {
  total: Int!
}

type LicenseUsageStats {
  id: String!
  softwareName: String!
  version: String!
  concurrencyLimit: Int!
  usedCount: Int!
  availableCount: Int!
  isOverLimit: Boolean!
  expiryDate: String
}

type ExpiringLicense {
  id: String!
  softwareName: String!
  expiryDate: String!
}

type LicenseStats {
  total: Int!
  stats: [LicenseUsageStats!]!
  expiringSoon: [ExpiringLicense!]!
}

type FaultStats {
  total: Int!
  byStatus: [StatusCount!]!
  bySeverity: [SeverityCount!]!
}

type StatusCount {
  status: String!
  count: Int!
}

type SeverityCount {
  severity: String!
  count: Int!
}

type DashboardStats {
  hardware: HardwareStats!
  users: UserStats!
  workplaces: WorkplaceStats!
  software: SoftwareStats!
  licenses: LicenseStats!
  faults: FaultStats!
}

# ============================================
# Queries
# ============================================

type Query {
  # Hardware
  hardwareAssets(skip: Int, take: Int, lifecycleState: String, type: String, search: String): HardwareAssetPaginated!
  hardwareAsset(id: String!): HardwareAsset
  hardwareBySerialNumber(serialNumber: String!): HardwareAsset

  # Users
  users(skip: Int, take: Int, search: String, department: String): UserPaginated!
  user(id: String!): User

  # Workplaces
  workplaces(skip: Int, take: Int, search: String, location: String): WorkplacePaginated!
  workplace(id: String!): Workplace

  # Software
  softwareCatalogs(skip: Int, take: Int, search: String, category: String): SoftwareCatalogPaginated!
  softwareCatalog(id: String!): SoftwareCatalog

  # Licenses
  licenses(skip: Int, take: Int, softwareId: String): LicensePaginated!
  license(id: String!): License

  # Faults
  faultHistoryIncidents(skip: Int, take: Int, hardwareId: String, status: String, severity: String): FaultHistoryIncidentPaginated!
  faultHistoryIncident(id: String!): FaultHistoryIncident

  # Dashboard
  dashboardStats: DashboardStats!
}

# ============================================
# Mutations
# ============================================

type Mutation {
  # Hardware
  createHardwareAsset(
    serialNumber: String!
    name: String!
    type: String!
    brand: String!
    model: String!
    lifecycleState: String = "active"
    purchaseDate: String
    warrantyEndDate: String
    discoveryMetadata: String
  ): HardwareAsset!

  updateHardwareAsset(
    id: String!
    name: String
    lifecycleState: String
    brand: String
    model: String
    type: String
    discoveryMetadata: String
  ): HardwareAsset!

  deleteHardwareAsset(id: String!): HardwareAsset!
  cascadeDeleteHardwareAsset(id: String!): HardwareAsset!

  # Users
  createUser(
    employeeId: String!
    fullName: String!
    email: String!
    department: String
    position: String
  ): User!

  updateUser(
    id: String!
    fullName: String
    email: String
    department: String
    position: String
  ): User!

  deleteUser(id: String!): User!

  # Workplaces
  createWorkplace(
    name: String!
    userId: String!
    hardwareId: String!
    location: String
  ): Workplace!

  updateWorkplace(
    id: String!
    name: String
    location: String
    userId: String
    hardwareId: String
  ): Workplace!

  deleteWorkplace(id: String!): Workplace!

  # Software
  createSoftwareCatalog(
    softwareName: String!
    version: String!
    publisher: String
    category: String
  ): SoftwareCatalog!

  updateSoftwareCatalog(
    id: String!
    softwareName: String
    version: String
    publisher: String
    category: String
  ): SoftwareCatalog!

  deleteSoftwareCatalog(id: String!): SoftwareCatalog!

  # Licenses
  createLicense(
    softwareId: String!
    concurrencyLimit: Int! = 1
    licenseKey: String
    purchaseDate: String
    expiryDate: String
    price: Float
  ): License!

  updateLicense(
    id: String!
    concurrencyLimit: Int
    licenseKey: String
    expiryDate: String
    price: Float
  ): License!

  deleteLicense(id: String!): License!
  assignLicenseToHardware(hardwareId: String!, licenseId: String!): SoftwareInstallation!
  unassignLicenseFromHardware(hardwareId: String!, licenseId: String!): SoftwareInstallation!

  # Faults
  createFaultHistoryIncident(
    hardwareId: String!
    incidentDescription: String!
    severity: String = "medium"
  ): FaultHistoryIncident!

  updateFaultHistoryIncident(
    id: String!
    incidentDescription: String
    severity: String
    status: String
  ): FaultHistoryIncident!

  resolveFaultHistoryIncident(id: String!): FaultHistoryIncident!
  deleteFaultHistoryIncident(id: String!): FaultHistoryIncident!
}